plugins {
    id 'java'
    id 'jacoco'
    id 'media.barney.crap-java' version '0.3.2'
    id 'net.ltgt.errorprone' version '5.1.0'
    id 'org.springframework.boot' version '3.5.13'
}

group = 'media.barney'
version = '0.1.0-SNAPSHOT'
def lombokVersion = '1.18.44'
def jacocoVersion = '0.8.13'
def jspecifyVersion = '1.0.0'
def errorproneVersion = '2.48.0'
def nullawayVersion = '0.13.1'

repositories {
    mavenCentral()
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

jacoco {
    toolVersion = jacocoVersion
}

dependencies {
    implementation platform('org.springframework.boot:spring-boot-dependencies:3.5.13')
    annotationProcessor platform('org.springframework.boot:spring-boot-dependencies:3.5.13')
    testImplementation platform('org.springframework.boot:spring-boot-dependencies:3.5.13')

    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    compileOnly "org.jspecify:jspecify:${jspecifyVersion}"
    compileOnly "org.projectlombok:lombok:${lombokVersion}"

    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    annotationProcessor "org.projectlombok:lombok:${lombokVersion}"
    errorprone "com.google.errorprone:error_prone_core:${errorproneVersion}"
    errorprone "com.uber.nullaway:nullaway:${nullawayVersion}"

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testCompileOnly "org.jspecify:jspecify:${jspecifyVersion}"
    testCompileOnly "org.projectlombok:lombok:${lombokVersion}"
    testAnnotationProcessor "org.projectlombok:lombok:${lombokVersion}"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 25
    options.fork = true
    options.compilerArgs.addAll([
        '-XDcompilePolicy=simple',
        '--should-stop=ifError=FLOW',
        '-XDaddTypeAnnotationsToSymbol=true',
    ])
    options.forkOptions.jvmArgs.addAll([
        '--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
        '--add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
        '--add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED',
    ])
    options.errorprone {
        check('NullAway', net.ltgt.gradle.errorprone.CheckSeverity.ERROR)
        option('NullAway:AnnotatedPackages', 'media.barney.ai.skill')
    }
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.named('jacocoTestReport') {
    dependsOn(tasks.named('test'))
    reports {
        xml.required = true
        csv.required = false
        html.required = false
    }
}

tasks.register('qualityGate') {
    group = 'verification'
    description = 'Run the repository quality gate tasks.'
    dependsOn(tasks.named('check'), tasks.named('crap-java-check'))
}
